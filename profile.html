<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль — Клиника Доктор</title>
    <link rel="stylesheet" href="profile.css">
    <link rel="stylesheet" href="account-ui.css?v=5">
</head>
<body>

<header class="header">
    <div class="container nav">
        <a href="index.html" class="logo">Клиника Доктор</a>
        <nav class="menu">
            <a href="index.html">Главная</a>
            <a href="services.html">Услуги</a>
            <a href="doctors.html">Врачи</a>
            <a href="prices.html">Цены</a>
            <a href="contacts.html">Контакты</a>
        </nav>
        <a href="auth.html#register" class="btn primary">Записаться</a>
    </div>
</header>

<main class="profile-page">
    <section class="container profile-layout" data-profile-page>
        <aside class="profile-card">
            <div class="profile-avatar" data-profile-avatar>П</div>
            <h1 data-profile-name>Профиль пациента</h1>
            <div class="profile-details">
                <div class="profile-detail">
                    <span>Email</span>
                    <strong data-profile-email>user@example.com</strong>
                </div>
                <div class="profile-detail">
                    <span>Телефон</span>
                    <strong data-profile-phone>+7 (000) 000-00-00</strong>
                </div>
                <div class="profile-detail">
                    <span>Аккаунт создан</span>
                    <strong data-profile-created>01 января 2026</strong>
                </div>
            </div>
        </aside>

        <section class="profile-section">
            <div class="profile-summary">
                <div class="profile-summary-card">
                    <span>Активных записей</span>
                    <strong data-profile-count>0</strong>
                </div>
                <div class="profile-summary-card">
                    <span>Быстрое действие</span>
                    <a href="#" class="btn primary" data-quick-action="admin-consultation">Записаться к администратору</a>
                </div>
            </div>

            <h2>Мои записи</h2>
            <div class="profile-appointments" data-profile-appointments></div>
        </section>
    </section>
</main>

<footer class="footer">
    <div class="container">
        <p>© 2026 Клиника Доктор</p>
    </div>
</footer>

<script>
const links = document.querySelectorAll('.menu a');
links.forEach(link => {
    if (link.href === window.location.href) {
        link.classList.add('active');
    }
});
</script>
<script src="account-ui.js?v=5"></script>

</body>
</html>
