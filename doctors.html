<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Наши врачи — Клиника Доктор</title>
    <link rel="stylesheet" href="doctors.css">
    <link rel="stylesheet" href="account-ui.css?v=5">
</head>
<body>
<header class="header">
    <div class="container nav">
        <a href="index.html" class="logo">Клиника Доктор</a>
        <nav class="menu">
            <a href="index.html">Главная</a>
            <a href="services.html">Услуги</a>
            <a href="doctors.html" class="active">Врачи</a>
            <a href="prices.html">Цены</a>
            <a href="contacts.html">Контакты</a>
        </nav>
        <a href="auth.html#register" class="btn primary">Записаться</a>
    </div>
</header>

<section class="hero doctors-hero">
    <div class="container hero-content">
        <div class="hero-text">
            <h1>Наши врачи</h1>
            <p>Команда специалистов клиники</p>
        </div>
    </div>
</section>

<section class="doctor-filter container">
    <div class="filter-search-wrapper">
        <div class="filter-buttons"></div>
        <input type="text" class="doctor-search" placeholder="Поиск врача...">
    </div>
</section>

<section class="doctors-list container">
    <div class="grid"></div>
</section>

<footer class="footer">
    <div class="container">
        <p>© 2026 Клиника Доктор</p>
    </div>
</footer>

<script>
const links = document.querySelectorAll('.menu a');
links.forEach(link => {
    if (link.href === window.location.href) {
        link.classList.add('active');
    }
});
</script>
<script src="account-ui.js?v=5"></script>
</body>
</html>
